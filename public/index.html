<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doffin Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --border: #e2e6ec;
    --border-light: #edf0f4;
    --text: #1a2332;
    --text-secondary: #5a6578;
    --text-muted: #8a94a6;
    --blue: #3b7ddd;
    --blue-light: #ebf2fc;
    --blue-hover: #2d6bc4;
    --green: #2d9f6f;
    --green-light: #e8f7f0;
    --green-hover: #248a5e;
    --red: #d64545;
    --red-light: #fceaea;
    --red-hover: #c03636;
    --orange: #e2853b;
    --gray: #8a94a6;
    --gray-light: #f0f2f5;
    --gray-hover: #767f8f;
    --radius: 6px;
    --radius-lg: 10px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
    --shadow-lg: 0 4px 12px rgba(0,0,0,0.1);
    --transition: 150ms ease;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header-left h1 {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .header-left .subtitle {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .btn-refresh {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 16px;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all var(--transition);
  }
  .btn-refresh:hover {
    background: var(--gray-light);
    border-color: #cdd3dc;
  }
  .btn-refresh:active { transform: scale(0.97); }
  .btn-refresh.loading .refresh-icon { animation: spin 0.8s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Tabs ────────────────────────────────── */
  .tabs-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 0;
  }

  .tab-btn {
    position: relative;
    background: none;
    border: none;
    padding: 12px 20px;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: color var(--transition);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .tab-btn::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 12px;
    right: 12px;
    height: 2px;
    background: transparent;
    border-radius: 2px 2px 0 0;
    transition: background var(--transition);
  }
  .tab-btn:hover { color: var(--text-secondary); }
  .tab-btn.active { color: var(--blue); }
  .tab-btn.active::after { background: var(--blue); }

  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    border-radius: 10px;
    background: var(--gray-light);
    color: var(--text-muted);
    font-size: 0.72rem;
    font-weight: 600;
  }
  .tab-btn.active .badge {
    background: var(--blue-light);
    color: var(--blue);
  }

  .tabs-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    padding: 8px 0;
  }

  .btn-export {
    display: none;
    align-items: center;
    gap: 6px;
    background: var(--blue);
    border: none;
    border-radius: var(--radius);
    padding: 7px 14px;
    font-size: 0.78rem;
    font-weight: 500;
    color: #fff;
    cursor: pointer;
    transition: all var(--transition);
  }
  .btn-export:hover { background: var(--blue-hover); }
  .btn-export:active { transform: scale(0.97); }
  .btn-export.visible { display: inline-flex; }

  /* ── Main content ───────────────────────── */
  .main {
    padding: 24px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .table-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 860px;
  }

  thead th {
    text-align: left;
    padding: 10px 14px;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    white-space: nowrap;
    user-select: none;
  }
  thead th.sortable {
    cursor: pointer;
    position: relative;
  }
  thead th.sortable:hover {
    color: var(--text-primary);
  }
  thead th .sort-icon {
    display: inline-block;
    width: 14px;
    margin-left: 4px;
    vertical-align: middle;
    opacity: 0.3;
  }
  thead th.sort-active .sort-icon {
    opacity: 1;
  }
  thead th:first-child { border-radius: var(--radius-lg) 0 0 0; }
  thead th:last-child { border-radius: 0 var(--radius-lg) 0 0; }

  tbody tr {
    transition: background var(--transition);
  }
  tbody tr:hover { background: #f9fafb; }
  tbody tr:not(:last-child) td { border-bottom: 1px solid var(--border-light); }

  td {
    padding: 10px 14px;
    font-size: 0.84rem;
    vertical-align: middle;
  }

  /* Column widths */
  .col-name { min-width: 240px; }
  .col-buyer { min-width: 160px; max-width: 220px; }
  .col-place { min-width: 80px; }
  .col-id { min-width: 80px; white-space: nowrap; }
  .col-published { width: 96px; white-space: nowrap; }
  .col-deadline { width: 96px; white-space: nowrap; }
  .col-comment { min-width: 140px; }
  .col-actions { min-width: 120px; white-space: nowrap; text-align: right; }

  /* Name cell */
  .notice-name {
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }
  .notice-name-text {
    color: var(--text);
    font-weight: 500;
    cursor: pointer;
    transition: color var(--transition);
    line-height: 1.4;
  }
  .notice-name-text:hover { color: var(--blue); }

  .doffin-link {
    flex-shrink: 0;
    margin-top: 2px;
    color: var(--text-muted);
    transition: color var(--transition);
  }
  .doffin-link:hover { color: var(--blue); }
  .doffin-link svg { display: block; }

  .buyer-text {
    color: var(--text-secondary);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    max-width: 220px;
    word-break: break-word;
  }

  .place-text {
    color: var(--text-secondary);
  }

  .id-text {
    color: var(--text-secondary);
    font-size: 0.78rem;
  }

  .date-text { color: var(--text-secondary); }
  .date-text.deadline-soon {
    color: var(--red);
    font-weight: 600;
  }

  /* Sub-status select */
  .sub-status-select {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 6px;
    font-size: 0.75rem;
    font-family: var(--font);
    font-weight: 500;
    color: var(--text-secondary);
    background: var(--surface);
    cursor: pointer;
    outline: none;
    transition: all var(--transition);
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%238a94a6' stroke-width='2.5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 6px center;
    padding-right: 20px;
  }
  .sub-status-select:focus { border-color: var(--blue); }
  .sub-status-select.ss-vurdering { color: var(--text-muted); }
  .sub-status-select.ss-under-arbeid { color: var(--blue); border-color: #c4d9f2; background-color: var(--blue-light); }
  .sub-status-select.ss-tilbud-sendt { color: var(--green); border-color: #c6e6d6; background-color: var(--green-light); }
  .sub-status-select.ss-blokkert { color: var(--red); border-color: #ecc; background-color: var(--red-light); }

  /* Comment field */
  .comment-input {
    width: 100%;
    min-width: 120px;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 0.82rem;
    font-family: var(--font);
    color: var(--text);
    background: transparent;
    transition: all var(--transition);
    resize: none;
    overflow: hidden;
    field-sizing: content;
    word-break: break-word;
  }
  .comment-input::placeholder { color: var(--text-muted); }
  .comment-input:hover { border-color: var(--border); background: var(--surface); }
  .comment-input:focus {
    outline: none;
    border-color: var(--blue);
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(59,125,221,0.12);
  }

  /* Action buttons */
  .actions {
    display: flex;
    gap: 4px;
    justify-content: flex-end;
  }

  .act-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    transition: all var(--transition);
    color: var(--text-muted);
  }
  .act-btn svg { width: 14px; height: 14px; }

  .act-btn.act-relevant {
    color: var(--green);
    border-color: #c6e6d6;
    background: var(--green-light);
  }
  .act-btn.act-relevant:hover {
    background: #d1f0e0;
    border-color: #a5d6bd;
  }

  .act-btn.act-enrolled {
    color: var(--blue);
    border-color: #c4d9f2;
    background: var(--blue-light);
  }
  .act-btn.act-enrolled:hover {
    background: #dae8f9;
    border-color: #a8c8eb;
  }

  .act-btn.act-dismiss {
    color: var(--red);
    border-color: #ecc;
    background: var(--red-light);
  }
  .act-btn.act-dismiss:hover {
    background: #f8d8d8;
    border-color: #daa;
  }

  .act-btn.act-undo {
    color: var(--gray);
    border-color: var(--border);
    background: var(--gray-light);
  }
  .act-btn.act-undo:hover {
    background: #e4e7ec;
    border-color: #cdd3dc;
  }

  /* Expanded row */
  .expand-row td {
    padding: 0;
    border-bottom: 1px solid var(--border-light);
  }

  .expand-content {
    padding: 16px 14px 16px 14px;
    background: #fafbfc;
    border-top: 1px solid var(--border-light);
  }

  .expand-description {
    font-size: 0.84rem;
    color: var(--text-secondary);
    line-height: 1.65;
    max-width: 700px;
    white-space: pre-line;
    margin-bottom: 12px;
  }

  .expand-meta {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 16px;
    font-size: 0.8rem;
  }

  .expand-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--blue);
    text-decoration: none;
    font-weight: 500;
    transition: color var(--transition);
  }
  .expand-link:hover { color: var(--blue-hover); text-decoration: underline; }

  .expand-value {
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* Empty state */
  .empty-state {
    padding: 60px 20px;
    text-align: center;
  }
  .empty-state-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto 16px;
    color: var(--text-muted);
    opacity: 0.4;
  }
  .empty-state-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .empty-state-text {
    font-size: 0.84rem;
    color: var(--text-muted);
  }

  /* Loading state */
  .loading-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.84rem;
  }
  .loading-dots::after {
    content: "";
    animation: dots 1.4s steps(4,end) infinite;
  }
  @keyframes dots {
    0% { content: ""; }
    25% { content: "."; }
    50% { content: ".."; }
    75% { content: "..."; }
  }

  /* Error state */
  .error-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--red);
    font-size: 0.84rem;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: #fff;
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 0.82rem;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transform: translateY(8px);
    transition: all 250ms ease;
    pointer-events: none;
    z-index: 1000;
  }
  .toast.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Tooltip on action buttons */
  .act-btn { position: relative; }
  .act-btn::before {
    content: attr(data-tooltip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: #fff;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 500;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition);
  }
  .act-btn:hover::before { opacity: 1; }

  /* Row fade-out animation */
  .row-exit {
    animation: rowFade 300ms ease forwards;
  }
  @keyframes rowFade {
    to { opacity: 0; transform: translateX(16px); }
  }

  /* ── CPV Settings Panel ─────────────────── */
  .header-buttons {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-settings {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 16px;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all var(--transition);
  }
  .btn-settings:hover {
    background: var(--gray-light);
    border-color: #cdd3dc;
  }
  .btn-settings:active { transform: scale(0.97); }

  .cpv-panel {
    display: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
  }
  .cpv-panel.visible { display: block; }

  .cpv-panel-inner {
    max-width: 600px;
  }
  .cpv-panel-title {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
  }
  .cpv-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .cpv-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--blue-light);
    color: var(--blue);
    border: 1px solid #c9ddf5;
    border-radius: 20px;
    padding: 4px 10px 4px 12px;
    font-size: 0.78rem;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .cpv-tag button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border: none;
    background: transparent;
    color: var(--blue);
    cursor: pointer;
    border-radius: 50%;
    font-size: 1rem;
    line-height: 1;
    padding: 0;
    transition: background var(--transition);
  }
  .cpv-tag button:hover {
    background: rgba(59,125,221,0.15);
  }
  .cpv-add-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .cpv-input {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    font-size: 0.82rem;
    font-family: var(--font);
    width: 140px;
    outline: none;
    transition: border-color var(--transition);
  }
  .cpv-input:focus { border-color: var(--blue); }
  .cpv-input::placeholder { color: var(--text-muted); }
  .btn-cpv-add {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--blue);
    border: none;
    border-radius: var(--radius);
    padding: 6px 12px;
    font-size: 0.78rem;
    font-weight: 500;
    color: #fff;
    cursor: pointer;
    transition: all var(--transition);
  }
  .btn-cpv-add:hover { background: var(--blue-hover); }
  .btn-cpv-add:active { transform: scale(0.97); }
  .cpv-hint {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 8px;
  }

  /* ── Buyer Filter ──────────────────────────── */
  .filter-wrapper {
    position: relative;
    display: inline-flex;
  }
  .btn-filter {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid transparent;
    border-radius: var(--radius);
    padding: 6px 12px;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all var(--transition);
  }
  .btn-filter:hover {
    background: var(--gray-light);
    color: var(--text-secondary);
  }
  .btn-filter.active-filter {
    color: var(--blue);
    background: var(--blue-light);
    border-color: #c9ddf5;
  }
  .filter-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border-radius: 9px;
    background: var(--blue);
    color: #fff;
    font-size: 0.68rem;
    font-weight: 600;
  }
  .filter-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    z-index: 100;
    min-width: 280px;
    max-width: 380px;
    max-height: 400px;
    overflow: hidden;
    flex-direction: column;
  }
  .filter-dropdown.visible {
    display: flex;
  }
  .filter-search {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border-light);
  }
  .filter-search input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    font-size: 0.82rem;
    font-family: var(--font);
    outline: none;
    transition: border-color var(--transition);
  }
  .filter-search input:focus { border-color: var(--blue); }
  .filter-search input::placeholder { color: var(--text-muted); }
  .filter-actions {
    display: flex;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-light);
  }
  .filter-actions button {
    background: none;
    border: none;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--blue);
    cursor: pointer;
    padding: 2px 0;
  }
  .filter-actions button:hover { text-decoration: underline; }
  .filter-list {
    overflow-y: auto;
    max-height: 300px;
    padding: 4px 0;
  }
  .filter-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    cursor: pointer;
    transition: background var(--transition);
    font-size: 0.82rem;
    color: var(--text);
  }
  .filter-item:hover { background: var(--gray-light); }
  .filter-item input[type="checkbox"] {
    accent-color: var(--blue);
    width: 15px;
    height: 15px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .filter-item label {
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .filter-item .filter-item-count {
    margin-left: auto;
    font-size: 0.72rem;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* ── Page Navigation ─────────────────────── */
  .page-nav {
    background: var(--text);
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 0;
  }

  .page-btn {
    position: relative;
    background: none;
    border: none;
    padding: 11px 22px;
    font-size: 0.85rem;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    transition: color var(--transition);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .page-btn::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 8px;
    right: 8px;

(function() {

  const pageTitles = {

    bookmark: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>',
    x: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
    undo: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>',
    external: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>',

  };

  // ── Helpers ─────────────────────────────────
  function formatDate(dateStr) {
    if (!dateStr) return '\u2014';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return '\u2014';
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const yyyy = d.getFullYear();
    return dd + '.' + mm + '.' + yyyy;
  }

  function isDeadlineSoon(dateStr) {
    if (!dateStr) return false;
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return false;
    const now = new Date();
    const diff = d.getTime() - now.getTime();
    return diff > 0 && diff < 30 * 24 * 60 * 60 * 1000;
  }

  function formatNOK(amount) {
    if (amount == null) return null;
    return Number(amount).toLocaleString('nb-NO', { maximumFractionDigits: 0 }) + ' NOK';
  }

  function escapeHtml(str) {
    if (!str) return '';
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
    return String(str).replace(/[&<>"']/g, c => map[c]);
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('visible');
    clearTimeout(el._timer);
    el._timer = setTimeout(() => el.classList.remove('visible'), 2200);
  }

  // ── Filter notices for tab ──────────────────
  function getNoticesForTab(tab) {
    let filtered;
    if (tab === 'nye') {
      filtered = notices.filter(n => !n.userStatus);
    } else if (tab === 'aktuelle') {
      filtered = notices.filter(n => n.userStatus === 'relevant');
    } else if (tab === 'paameldt') {
      filtered = notices.filter(n => n.userStatus === 'enrolled');
    } else {
      filtered = notices.filter(n => n.userStatus === 'dismissed');
    }
    // Filter by selected buyers
    if (selectedBuyers !== null) {
      filtered = filtered.filter(n => {
        const names = (n.buyer || []).map(b => b.name);
        return names.some(name => selectedBuyers.has(name));
      });
    }
    // Sort by active column
    filtered.sort((a, b) => {
      let va, vb;
      switch (sortColumn) {
        case 'name':
          va = (a.heading || '').toLowerCase();
          vb = (b.heading || '').toLowerCase();
          break;
        case 'buyer':
          va = ((a.buyer || []).map(x => x.name).join(', ') || '').toLowerCase();
          vb = ((b.buyer || []).map(x => x.name).join(', ') || '').toLowerCase();
          break;
        case 'place':
          va = ((a.placeOfPerformance && a.placeOfPerformance.length) ? a.placeOfPerformance.join(', ') : (a.locationId || []).join(', ')).toLowerCase();
          vb = ((b.placeOfPerformance && b.placeOfPerformance.length) ? b.placeOfPerformance.join(', ') : (b.locationId || []).join(', ')).toLowerCase();
          break;
        case 'internalId':
          va = (a.internalId || '').toLowerCase();
          vb = (b.internalId || '').toLowerCase();
          break;
        case 'published':
          va = new Date(a.publicationDate || 0).getTime();
          vb = new Date(b.publicationDate || 0).getTime();
          break;
        case 'deadline':
          va = new Date(a.deadline || 0).getTime();
          vb = new Date(b.deadline || 0).getTime();
          break;
        case 'comment':
          va = (a.userComment || '').toLowerCase();
          vb = (b.userComment || '').toLowerCase();
          break;
        default:
          va = new Date(a.publicationDate || 0).getTime();
          vb = new Date(b.publicationDate || 0).getTime();
      }
      if (va < vb) return sortDirection === 'asc' ? -1 : 1;
      if (va > vb) return sortDirection === 'asc' ? 1 : -1;
      return 0;
    });
    return filtered;
  }

  // ── Update badge counts ─────────────────────
  function updateBadges() {
    document.getElementById('badgeNye').textContent = notices.filter(n => !n.userStatus).length;
    document.getElementById('badgeAktuelle').textContent = notices.filter(n => n.userStatus === 'relevant').length;
    document.getElementById('badgePaameldt').textContent = notices.filter(n => n.userStatus === 'enrolled').length;
    document.getElementById('badgeAvvist').textContent = notices.filter(n => n.userStatus === 'dismissed').length;
  }

  // ── Update subtitle ─────────────────────────
  function updateSubtitle() {
    const total = notices.length;
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('subtitle').textContent =
      total + ' kunngjøringer \u00B7 Sist oppdatert ' + hh + ':' + mm;
  }

  function updatePageBadges() {
    document.getElementById('pageBadgeDps').textContent = dpsNotices.length;
    document.getElementById('pageBadgeRammeavtaler').textContent = rammeavtalerNotices.length;
    document.getElementById('pageBadgeSystemer').textContent = systemerNotices.length;
  }

    const data = getNoticesForTab(activeTab);

    let html = '';
    for (const n of data) {

      const place = (n.placeOfPerformance && n.placeOfPerformance.length)

        : ((n.locationId && n.locationId.length) ? n.locationId.join(', ') : '\u2014');
      const pubDate = formatDate(n.publicationDate);
      const dlDate = formatDate(n.deadline);
      const dlSoon = isDeadlineSoon(n.deadline);
      const comment = escapeHtml(n.userComment || '');
      const isExpanded = expandedId === n.id;

      let actionsHtml = '<div class="actions">';

          '<button class="act-btn act-relevant" data-tooltip="Marker som aktuell" onclick="app.setStatus(\'' + n.id + '\',\'relevant\')"><span>' + icons.check + '</span></button>' +

        actionsHtml +=
          '<select class="sub-status-select ' + ssCls + '" onchange="app.setSubStatus(\'' + n.id + '\', this.value)">' +

            '<option value="tilbud-sendt"' + (ss === 'tilbud-sendt' ? ' selected' : '') + '>Tilbud sendt</option>' +
            '<option value="blokkert"' + (ss === 'blokkert' ? ' selected' : '') + '>Blokkert</option>' +
          '</select>' +
          '<button class="act-btn act-enrolled" data-tooltip="Marker som påmeldt" onclick="app.setStatus(\'' + n.id + '\',\'enrolled\')"><span>' + icons.bookmark + '</span></button>' +
          '<button class="act-btn act-dismiss" data-tooltip="Avvis" onclick="app.setStatus(\'' + n.id + '\',\'dismissed\')"><span>' + icons.x + '</span></button>' +
          '<button class="act-btn act-undo" data-tooltip="Tilbakestill" onclick="app.resetStatus(\'' + n.id + '\')"><span>' + icons.undo + '</span></button>';
      } else if (activeTab === 'paameldt') {
        actionsHtml +=
          '<button class="act-btn act-undo" data-tooltip="Tilbakestill" onclick="app.resetStatus(\'' + n.id + '\')"><span>' + icons.undo + '</span></button>';

  window.switchTab = function(tab) {
    activeTab = tab;
    expandedId = null;

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });

    const exportBtn = document.getElementById('btnExport');
    exportBtn.classList.toggle('visible', tab === 'aktuelle');

  // ── Expand/collapse ─────────────────────────
  function toggleExpand(id) {
    expandedId = expandedId === id ? null : id;
    render();

  // ── Supabase data layer ─────────────────────
  function getNoticesRef() {
    if (currentPage === 'dps') return dpsNotices;
    if (currentPage === 'rammeavtaler') return rammeavtalerNotices;
    return systemerNotices;
  }

  function setNoticesRef(arr) {
    if (currentPage === 'dps') dpsNotices = arr;
    else if (currentPage === 'rammeavtaler') rammeavtalerNotices = arr;
    else systemerNotices = arr;
    notices = arr;
  }

  async function fetchUserMap() {
    const { data: userData } = await sb
      .from('user_notices')
      .select('*');
    const userMap = {};
    if (userData) {
      for (const row of userData) {
        userMap[row.notice_id] = row;
      }
    }
    return userMap;
  }

  function mergeUserData(hits, userMap) {
    return hits.map(hit => {
      const ud = userMap[hit.id] || null;
      return {
        ...hit,
        userStatus: ud ? ud.status : null,
        userComment: ud ? ud.comment : '',
        userSubStatus: ud ? (ud.sub_status || 'vurdering') : 'vurdering'
      };
    });
  }

  async function fetchAllData() {
    // Fetch DPS and open competitions in parallel, plus user data
    const [dpsResp, openResp, userMap] = await Promise.all([
      fetch(SUPABASE_URL + '/functions/v1/doffin-proxy', {
        headers: { 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
      }),
      fetch(SUPABASE_URL + '/functions/v1/doffin-proxy-open', {
        headers: { 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
      }),
      fetchUserMap()
    ]);

    if (!dpsResp.ok) throw new Error('DPS HTTP ' + dpsResp.status);
    if (!openResp.ok) throw new Error('Open HTTP ' + openResp.status);

    const dpsData = await dpsResp.json();
    const openData = await openResp.json();

    // Split open notices by category
    const rammeavtalerHits = (openData.hits || []).filter(h => h.category === 'rammeavtale');
    const systemerHits = (openData.hits || []).filter(h => h.category === 'system');

    // Merge with user data
    dpsNotices = mergeUserData(dpsData.hits || [], userMap);
    rammeavtalerNotices = mergeUserData(rammeavtalerHits, userMap);
    systemerNotices = mergeUserData(systemerHits, userMap);

    // Point notices to current page
    notices = getNoticesRef();
  }

  // Legacy function for compatibility
  async function fetchNotices() {
    await fetchAllData();
    return notices;
  }

  async function upsertUserData(id, status, comment, subStatus) {
    const row = {
      notice_id: id,
      status: status,
      comment: comment || '',
      updated_at: new Date().toISOString()
    };
    if (subStatus !== undefined) row.sub_status = subStatus;
    const { error } = await sb
      .from('user_notices')
      .upsert(row, { onConflict: 'notice_id' });
    if (error) throw error;
  }

  async function deleteUserData(id) {
    const { error } = await sb
      .from('user_notices')
      .delete()
      .eq('notice_id', id);
    if (error) throw error;
  }

  // ── Set status (optimistic) ─────────────────
  async function setStatus(id, status) {
    const notice = notices.find(n => n.id === id);
    if (!notice) return;

    const previousStatus = notice.userStatus;

    // Animate out
    const row = document.getElementById('row-' + CSS.escape(id));
    if (row) {
      row.classList.add('row-exit');
      const expandRow = row.nextElementSibling;
      if (expandRow && expandRow.classList.contains('expand-row')) {
        expandRow.classList.add('row-exit');
      }
    }

    // Optimistic update after animation
    setTimeout(async () => {
      notice.userStatus = status;
      if (status === 'relevant') notice.userSubStatus = 'vurdering';
      if (expandedId === id) expandedId = null;
      render();

      const labels = { dismissed: 'Avvist', relevant: 'Markert som aktuell', enrolled: 'Markert som påmeldt' };
      showToast(labels[status] || 'Oppdatert');

      try {
        const subSt = status === 'relevant' ? 'vurdering' : undefined;
        await upsertUserData(id, status, notice.userComment || '', subSt);
      } catch (err) {
        console.error('Feil ved lagring:', err);
        notice.userStatus = previousStatus;
        render();
        showToast('Feil ved lagring');
      }
    }, 280);
  }

  // ── Reset status ────────────────────────────
  async function resetStatus(id) {
    const notice = notices.find(n => n.id === id);
    if (!notice) return;

    const previousStatus = notice.userStatus;

    const row = document.getElementById('row-' + CSS.escape(id));
    if (row) {
      row.classList.add('row-exit');
      const expandRow = row.nextElementSibling;
      if (expandRow && expandRow.classList.contains('expand-row')) {
        expandRow.classList.add('row-exit');
      }
    }

    setTimeout(async () => {
      notice.userStatus = null;
      if (expandedId === id) expandedId = null;
      render();
      showToast('Tilbakestilt');

      try {
        await deleteUserData(id);
      } catch (err) {
        console.error('Feil ved tilbakestilling:', err);
        notice.userStatus = previousStatus;
        render();
        showToast('Feil ved tilbakestilling');
      }
    }, 280);
  }

  // ── Comment handling (debounced) ────────────
  function onCommentInput(id, value) {
    const notice = notices.find(n => n.id === id);
    if (notice) notice.userComment = value;

    clearTimeout(commentTimers[id]);
    commentTimers[id] = setTimeout(() => {
      saveComment(id, value);
    }, 500);
  }

  async function saveComment(id, value) {
    clearTimeout(commentTimers[id]);

    const notice = notices.find(n => n.id === id);
    if (!notice) return;

    try {
      if (notice.userStatus) {
        await upsertUserData(id, notice.userStatus, value || '');
      } else {
        // No status yet — need to save with a temporary marker
        // Only save if there's actually a comment
        if (value && value.trim()) {
          await upsertUserData(id, 'relevant', value);
          notice.userStatus = 'relevant';
          render();
          showToast('Kommentar lagret (markert som aktuell)');
        }
      }
    } catch (err) {
      console.error('Feil ved lagring av kommentar:', err);
      showToast('Feil ved lagring av kommentar');
    }
  }

  // ── Export ──────────────────────────────────
  window.exportRelevant = function() {
    const relevant = notices.filter(n => n.userStatus === 'relevant');
    const exported = relevant.map(n => ({
      name: n.heading || n.id,
      customer: (n.buyer && n.buyer.length > 0) ? n.buyer[0].name : 'Ukjent',
      link: 'https://doffin.no/notices/' + n.id
    }));

    const blob = new Blob([JSON.stringify(exported, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    a.href = url;
    a.download = 'doffin-aktuelle-' + yyyy + '-' + mm + '-' + dd + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Eksport lastet ned');
  };

  window.refreshData = async function() {
    const btn = document.getElementById('btnRefresh');
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      await fetchAllData();
      updateSubtitle();
      updatePageBadges();
      render();
      showToast('Data oppdatert');
    } catch (err) {
      console.error('Feil ved oppdatering:', err);
      showToast('Feil ved henting av data');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  };

  // ── Initial load ────────────────────────────
  async function init() {
    // Detect page from hash
    const hash = window.location.hash.replace('#', '');
    if (['dps', 'rammeavtaler', 'systemer'].indexOf(hash) !== -1) {
      currentPage = hash;

      tbody.innerHTML =
        '<tr><td colspan="8" class="error-state">' +
          'Kunne ikke hente data. Pr\u00F8v \u00E5 oppdatere siden.' +

  // ── Hash change listener ───────────────────
  window.addEventListener('hashchange', function() {
    const hash = window.location.hash.replace('#', '');
    if (['dps', 'rammeavtaler', 'systemer'].indexOf(hash) !== -1 && hash !== currentPage) {
      switchPage(hash);
    }

  // ── Sort by column ─────────────────────────
  function sortBy(column) {
    if (sortColumn === column) {
      sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
    } else {
      sortColumn = column;
      sortDirection = (column === 'published' || column === 'deadline') ? 'desc' : 'asc';
    }
    updateSortHeaders();
    render();
  }

  function updateSortHeaders() {
    document.querySelectorAll('thead th.sortable').forEach(th => {
      const col = th.dataset.sort;
      const icon = th.querySelector('.sort-icon');
      if (col === sortColumn) {
        th.classList.add('sort-active');
        icon.innerHTML = sortDirection === 'asc' ? '&#x2191;' : '&#x2193;';
      } else {
        th.classList.remove('sort-active');
        icon.innerHTML = '&#x2195;';
      }
    });
  }

  // ── Sub-status for aktuelle ─────────────────
  async function setSubStatus(id, subStatus) {
    const notice = notices.find(n => n.id === id);
    if (!notice) return;

    const prev = notice.userSubStatus;
    notice.userSubStatus = subStatus;
    render();

    const labels = { 'vurdering': 'Vurdering', 'under-arbeid': 'Under arbeid', 'tilbud-sendt': 'Tilbud sendt', 'blokkert': 'Blokkert' };
    showToast(labels[subStatus] || 'Oppdatert');

    try {
      await upsertUserData(id, notice.userStatus, notice.userComment || '', subStatus);
    } catch (err) {
      console.error('Feil ved lagring av substatus:', err);
      notice.userSubStatus = prev;
      render();
      showToast('Feil ved lagring');
    }
  }

  // ── AI analysis ─────────────────────────────
  function renderAiResult(analysis) {
    const a = analysis.analysis || analysis;
    const verdictLabels = {
      build_from_scratch: 'Kan bygges fra scratch',
      existing_saas: 'Ser ut som SaaS-tilpasning',
      ambiguous: 'Uklart'
    };
    const verdictClasses = {
      build_from_scratch: 'verdict-build',
      existing_saas: 'verdict-saas',
      ambiguous: 'verdict-ambiguous'
    };
    const verdictIcons = {
      build_from_scratch: '\u2705',
      existing_saas: '\u26A0\uFE0F',
      ambiguous: '\u2753'
    };

    let competitorsHtml = '';
    if (a.saas_competitors && a.saas_competitors.length > 0) {
      competitorsHtml = '<div class="ai-competitors">' +
        a.saas_competitors.map(function(c) { return '<span class="ai-competitor-tag">' + escapeHtml(c) + '</span>'; }).join('') +
        '</div>';
    }

    return '<div class="ai-result">' +
      '<div class="ai-verdict ' + (verdictClasses[a.verdict] || 'verdict-ambiguous') + '">' +
        (verdictIcons[a.verdict] || '') + ' ' + (verdictLabels[a.verdict] || a.verdict) +
        ' <span style="font-weight:400;font-size:0.75rem;opacity:0.7">(' + (a.confidence || 'ukjent') + ' konfidens)</span>' +
      '</div>' +
      '<div class="ai-summary">' + escapeHtml(a.summary || '') + '</div>' +
      competitorsHtml +
      (a.buildability_note ? '<div class="ai-detail"><strong>Vurdering:</strong> ' + escapeHtml(a.buildability_note) + '</div>' : '') +
      (a.reasoning ? '<div class="ai-detail" style="margin-top:4px"><strong>Begrunnelse:</strong> ' + escapeHtml(a.reasoning) + '</div>' : '') +
    '</div>';
  }

  async function analyzeNotice(id) {
    const btn = document.getElementById('ai-btn-' + CSS.escape(id));
    if (btn) {
      btn.disabled = true;
      btn.innerHTML = '<span class="ai-spinner"></span> Analyserer...';

    try {
      const resp = await fetch(SUPABASE_URL + '/functions/v1/claude-analysis', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          'Content-Type': 'application/json'
        },

      });

      aiAnalyses[id] = result;
      render();
      showToast('AI-analyse fullf\u00F8rt');
    } catch (err) {
      console.error('AI-analysefeil:', err);
      if (btn) {
        btn.disabled = false;
        btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 0-4 4c0 2 2 3 2 6H14c0-3 2-4 2-6a4 4 0 0 0-4-4z"/><line x1="10" y1="16" x2="14" y2="16"/><line x1="10" y1="19" x2="14" y2="19"/><line x1="11" y1="22" x2="13" y2="22"/></svg> Analyser med AI';
      }
      showToast('Feil ved AI-analyse');
    }
  }

  // ── CPV code management ───────────────────
  window.toggleCpvPanel = function() {
    const panel = document.getElementById('cpvPanel');
    panel.classList.toggle('visible');
    if (panel.classList.contains('visible')) {
      loadCpvCodes();
    }
  };

  async function loadCpvCodes() {
    const { data, error } = await sb
      .from('cpv_codes')
      .select('code')
      .order('code');
    if (error) {
      showToast('Kunne ikke hente CPV-koder');
      return;
    }
    renderCpvCodes((data || []).map(r => r.code));
  }

  function renderCpvCodes(codes) {
    const list = document.getElementById('cpvList');
    if (codes.length === 0) {
      list.innerHTML = '<span style="font-size:0.82rem;color:var(--text-muted)">Ingen CPV-koder konfigurert</span>';
      return;
    }
    list.innerHTML = codes.map(code =>
      '<span class="cpv-tag">' + escapeHtml(code) +
      '<button onclick="removeCpvCode(\'' + escapeHtml(code) + '\')" title="Fjern">&times;</button></span>'
    ).join('');
  }

  window.addCpvCode = async function() {
    const input = document.getElementById('cpvInput');
    const code = input.value.trim();
    if (!/^\d{8}$/.test(code)) {
      showToast('CPV-kode må være 8 siffer');
      return;
    }
    const { error } = await sb
      .from('cpv_codes')
      .upsert({ code: code }, { onConflict: 'code' });
    if (error) {
      showToast('Kunne ikke legge til CPV-kode');
      return;
    }
    input.value = '';
    showToast('CPV-kode ' + code + ' lagt til');
    loadCpvCodes();
  };

  window.removeCpvCode = async function(code) {
    const { error } = await sb
      .from('cpv_codes')
      .delete()
      .eq('code', code);
    if (error) {
      showToast('Kunne ikke fjerne CPV-kode');
      return;
    }
    showToast('CPV-kode ' + code + ' fjernet');
    loadCpvCodes();
  };

  // ── Buyer filter ───────────────────────────
  function getAllBuyers() {
    const counts = {};
    for (const n of notices) {
      for (const b of (n.buyer || [])) {
        counts[b.name] = (counts[b.name] || 0) + 1;
      }
    }
    return Object.entries(counts)
      .sort((a, b) => a[0].localeCompare(b[0], 'nb'))
      .map(([name, count]) => ({ name, count }));
  }

  function renderFilterList() {
    const allBuyers = getAllBuyers();
    const search = filterSearchText.toLowerCase();
    const filtered = search
      ? allBuyers.filter(b => b.name.toLowerCase().includes(search))
      : allBuyers;

    const list = document.getElementById('filterList');
    list.innerHTML = filtered.map(b => {
      const checked = selectedBuyers === null || selectedBuyers.has(b.name);
      return '<label class="filter-item">' +
        '<input type="checkbox"' + (checked ? ' checked' : '') +
        ' onchange="app.toggleBuyer(\'' + escapeHtml(b.name.replace(/'/g, "\\'")) + '\', this.checked)">' +
        '<span>' + escapeHtml(b.name) + '</span>' +
        '<span class="filter-item-count">' + b.count + '</span>' +
        '</label>';
    }).join('');
  }

  function updateFilterButton() {
    const btn = document.getElementById('btnFilter');
    const allCount = getAllBuyers().length;
    if (selectedBuyers !== null && selectedBuyers.size < allCount) {
      btn.classList.add('active-filter');
      btn.innerHTML =
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>' +
        'Kunde <span class="filter-count">' + selectedBuyers.size + '</span>';
    } else {
      btn.classList.remove('active-filter');
      btn.innerHTML =
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>' +
        'Kunde';
    }
  }

  function toggleFilter() {
    const dd = document.getElementById('filterDropdown');
    const isVisible = dd.classList.contains('visible');
    if (isVisible) {
      dd.classList.remove('visible');
    } else {
      filterSearchText = '';
      document.getElementById('filterSearchInput').value = '';
      renderFilterList();
      dd.classList.add('visible');
    }
  }

  function toggleBuyer(name, checked) {
    const allBuyers = getAllBuyers();
    if (selectedBuyers === null) {
      selectedBuyers = new Set(allBuyers.map(b => b.name));
    }
    if (checked) {
      selectedBuyers.add(name);
      if (selectedBuyers.size === allBuyers.length) {
        selectedBuyers = null;
      }
    } else {
      selectedBuyers.delete(name);
    }
    updateFilterButton();
    render();
  }

  function filterSelectAll() {
    selectedBuyers = null;
    renderFilterList();
    updateFilterButton();
    render();
  }

  function filterSelectNone() {
    selectedBuyers = new Set();
    renderFilterList();
    updateFilterButton();
    render();
  }

  function onFilterSearch(text) {
    filterSearchText = text;
    renderFilterList();
  }

  // Close filter dropdown when clicking outside
  document.addEventListener('click', function(e) {
    const wrapper = document.querySelector('.filter-wrapper');
    if (wrapper && !wrapper.contains(e.target)) {
      document.getElementById('filterDropdown').classList.remove('visible');
    }
  });

  window.app = Object.assign(window.app, {
    toggleFilter: toggleFilter,
    toggleBuyer: toggleBuyer,
    filterSelectAll: filterSelectAll,
    filterSelectNone: filterSelectNone,
    onFilterSearch: onFilterSearch
  });

  init();
})();
</script>
</body>
</html>
